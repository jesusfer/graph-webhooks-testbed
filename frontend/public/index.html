<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Graph Webhooks Testbed</title>
        <link rel="icon" type="image/png" href="/images/graph.png" />
        <link rel="stylesheet" href="/css/styles.css" />
    </head>

    <body>
        <div id="header-root"></div>

        <!-- Scopes consent modal (rendered by Preact) -->
        <div id="consent-modal-root"></div>

        <!-- Loading overlay (rendered by Preact) -->
        <div id="app-loading-root"></div>

        <main>
            <!-- Login (rendered by Preact) -->
            <div id="login-section-root"></div>

            <!-- App -->
            <div id="app-section">
                <!-- Section toggle (rendered by Preact) -->
                <div id="section-toggle-root"></div>

                <!-- Delegated Subscriptions (rendered by Preact) -->
                <div id="delegated-section-root"></div>

                <!-- App Subscriptions (rendered by Preact) -->
                <div id="app-section-root"></div>
            </div>

            <!-- Notification Detail -->
            <div id="detail-section"></div>
        </main>

        <script type="module" src="/js/app.js"></script>
    </body>
</html>
